<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendo - Book Recommender System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background-color: #000000;
    min-height: 100vh;
    margin: 0;
    padding: 0;
    position: relative;
    overflow-x: hidden;
}

.header {
    background-color: #FFFFFF;
    border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    padding: 15px 0;
    position: relative;
    z-index: 10;
}

.header-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 15px;
}

.brand-section {
    display: flex;
    align-items: center;
    gap: 15px;
}

.nav-menu {
    display: flex;
    align-items: center;
    gap: 30px;
}

.nav-item {
    font-size: 1rem;
    font-weight: 500;
    color: #000000;
    text-decoration: none;
    transition: color 0.3s ease;
    cursor: pointer;
}

.nav-item:hover {
    color: #666666;
}

.book-icon {
    font-size: 2rem;
    color: #000000;
    text-shadow: none;
}

.main-title {
    font-family: 'Merriweather', serif;
    font-size: 2rem;
    font-weight: 800;
    color: #000000;
    margin: 0;
    letter-spacing: -1px;
    text-shadow: none;
}

.content-area {
    min-height: calc(100vh - 70px);
    padding: 40px 40px 60px;
    position: relative;
}

.content-header {
    text-align: center;
    width: 100%;
    margin-bottom: 40px;
}

.section-title {
    font-family: 'Merriweather', serif;
    font-size: 2.5rem;
    font-weight: 700;
    color: #FFFFFF;
    margin: 0;
    letter-spacing: -1px;
}

.book-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 30px;
    padding: 20px 0;
}

.book-item {
    background-color: #1A1A1A;
    border-radius: 8px;
    padding: 15px;
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.book-item:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(255, 255, 255, 0.1);
}

.book-item img {
    width: 100%;
    height: 280px;
    object-fit: cover;
    border-radius: 4px;
    margin-bottom: 15px;
}

.book-item h3 {
    font-size: 1.1rem;
    font-weight: 600;
    color: #FFFFFF;
    margin-bottom: 8px;
    line-height: 1.3;
}

.book-item p {
    font-size: 0.9rem;
    color: #B0B0B0;
    margin-bottom: 5px;
    line-height: 1.4;
}

/* Responsive Design */
@media (max-width: 768px) {
    .header-content {
        padding: 0 20px;
        flex-direction: column;
        gap: 15px;
    }

    .brand-section {
        gap: 10px;
    }

    .nav-menu {
        gap: 20px;
    }

    .main-title {
        font-size: 1.8rem;
    }

    .book-icon {
        font-size: 1.8rem;
    }

    .nav-item {
        font-size: 0.9rem;
    }

    .book-list {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 20px;
        padding: 15px 0;
    }
}

@media (max-width: 480px) {
    .header-content {
        padding: 0 15px;
    }

    .brand-section {
        gap: 8px;
    }

    .nav-menu {
        gap: 15px;
    }

    .main-title {
        font-size: 1.5rem;
    }

    .book-icon {
        font-size: 1.5rem;
    }

    .nav-item {
        font-size: 0.85rem;
    }

    .book-item {
        padding: 12px;
    }

    .book-item img {
        height: 200px;
        margin-bottom: 12px;
    }

    .book-item h3 {
        font-size: 1rem;
        margin-bottom: 6px;
    }

    .book-item p {
        font-size: 0.85rem;
        margin-bottom: 4px;
    }
}
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="brand-section">
                <div class="book-icon">📚</div>
                <h1 class="main-title">Recommendo</h1>
            </div>
            <nav class="nav-menu">
                <a href="/" class="nav-item">Home</a>
                <a href="/recommend" class="nav-item">Recommend</a>
                <a href="#" class="nav-item">Contact</a>
            </nav>
        </div>
    </header>

    <main class="content-area">
        <div class="content-header">
            <h2 class="section-title">Top 50 Books</h2>
        </div>
        <div class="book-list">
            {% for i in range(book_name|length)%}
            <div class="book-item">
                <img src="{{ image[i] }}" alt="{{ book_name[i] }}">
                <h3>{{ book_name[i] }}</h3>
                <p>{{ author[i] }}</p>
                <p>Votes - {{ votes[i] }}</p>
                <p>Rating - {{ rating[i] }}</p>
            </div>
            {%endfor%}
        </div>
    </main>
</body>
</html>
